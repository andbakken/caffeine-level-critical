# Infra-stack for hostet drift (modell A). Kjører på Hetzner-VPS-en.
#   docker compose -f compose.infra.yml --env-file .env up -d
#
# Inneholder: Traefik (reverse proxy + auto-TLS), delt Postgres, control-plane.
# Tenant-app-containere startes IKKE her – control-plane lager dem dynamisk
# og kobler dem på nettene bq_edge (Traefik) + bq_data (Postgres).

networks:
  bq_edge:
    name: bq_edge      # Traefik <-> apper. Eksplisitt navn så control-plane kan attache tenants.
  bq_data:
    name: bq_data      # Postgres <-> control-plane + tenants. Intern, ikke rutet ut.
    internal: true

volumes:
  traefik_acme:
  pgdata:
  marketing_uploads:
  netdataconfig:
  netdatalib:
  netdatacache:

services:
  traefik:
    # v3.6: v3.3 sin docker-klient defaulter til API 1.24, som Docker 29 (min 1.40)
    # avviser → Traefik leser ikke labels (ingen ruter/TLS). Nyere Traefik forhandler
    # API-versjon riktig. DOCKER_API_VERSION beholdt som ekstra sikring.
    image: traefik:v3.6
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.44"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=bq_edge
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Tving HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt per host via HTTP-01 (krever bare at <host> peker på serveren – wildcard-DNS ordner det)
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
      # htpasswd-fil for basic-auth foran Netdata (ligger i infra/, git-ignorert).
      - ./netdata.htpasswd:/auth/netdata.htpasswd:ro
    networks:
      - bq_edge

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_DB: control_plane     # control-plane sin egen registry-DB
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bq_data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPER_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Bygger app-imaget én gang og tagger det som TENANT_IMAGE, slik at control-plane
  # kan kjøre nøyaktig samme image per kunde. Tjener også selve marketing-/onboarding-
  # nettstedet på apex-domenet.
  marketing:
    image: ${TENANT_IMAGE}
    build:
      context: ..
      args:
        # Bakes inn i sitemap.ts/robots.ts ved build (statisk prerender). Samme image
        # gjenbrukes for tenants; kun apex indekseres (tenants får noindex via proxy).
        NEXT_PUBLIC_SITE_URL: https://${BASE_DOMAIN}
    restart: unless-stopped
    depends_on:
      marketing-db-init:
        condition: service_completed_successfully
    environment:
      # Egen, begrenset rolle – IKKE superbrukeren. Marketing er eksponert på apex og
      # kjører samme image som tenants; en sårbarhet her skal ikke gi tilgang til andre
      # kunders databaser. Rollen eier kun «marketing»-databasen (se marketing-db-init).
      DATABASE_URL: postgresql://marketing_app:${MARKETING_DB_PASSWORD}@postgres:5432/marketing
      ADMIN_EMAIL: ${OWNER_EMAIL}
      CONTROL_PLANE_URL: http://control-plane:8080
      STATS_TOKEN: ${STATS_TOKEN}
      NEXT_PUBLIC_SITE_URL: https://${BASE_DOMAIN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      UPLOAD_DIR: /app/uploads
      # Umami web-analyse (kun apex; tom = ingen sporing). Runtime, ikke build-time.
      UMAMI_SRC: ${UMAMI_SRC:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      # Juridisk identitet for vilkår/personvern. Står bevisst IKKE i koden – repoet er
      # offentlig, og selvhostere skal ikke få våre personopplysninger med i klonen.
      # Mangler de, 404-er /vilkar og /personvern (se src/content/legal.ts).
      LEGAL_COMPANY_NAME: ${LEGAL_COMPANY_NAME:-}
      LEGAL_COMPANY_ORGNR: ${LEGAL_COMPANY_ORGNR:-}
      LEGAL_COMPANY_ADDRESS_NO: ${LEGAL_COMPANY_ADDRESS_NO:-}
      LEGAL_COMPANY_ADDRESS_EN: ${LEGAL_COMPANY_ADDRESS_EN:-}
      LEGAL_CONTACT_EMAIL: ${LEGAL_CONTACT_EMAIL:-}
    volumes:
      - marketing_uploads:/app/uploads
    networks:
      - bq_edge
      - bq_data
    labels:
      - traefik.enable=true
      - traefik.http.routers.marketing.rule=Host(`${BASE_DOMAIN}`) || Host(`www.${BASE_DOMAIN}`)
      - traefik.http.routers.marketing.entrypoints=websecure
      - traefik.http.routers.marketing.tls.certresolver=le
      - traefik.http.services.marketing.loadbalancer.server.port=3000

  # Oppretter «marketing»-databasen + en begrenset rolle som eier den (Prisma lager
  # verken databasen eller rollen). Idempotent: hopper over det som finnes, men setter
  # alltid passordet på nytt så det følger MARKETING_DB_PASSWORD i .env.
  marketing-db-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_SUPER_PASSWORD}
      MARKETING_DB_PASSWORD: ${MARKETING_DB_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        PSQL="psql -h postgres -U ${POSTGRES_SUPER_USER} -v ON_ERROR_STOP=1"
        # Rolle (opprett hvis mangler, sett/roter alltid passord)
        if [ -z "$$($$PSQL -tAc "SELECT 1 FROM pg_roles WHERE rolname='marketing_app'")" ]; then
          $$PSQL -c "CREATE ROLE marketing_app LOGIN PASSWORD '$$MARKETING_DB_PASSWORD'"
        else
          $$PSQL -c "ALTER ROLE marketing_app WITH PASSWORD '$$MARKETING_DB_PASSWORD'"
        fi
        # Database eid av rollen (opprett hvis mangler)
        if [ -z "$$($$PSQL -tAc "SELECT 1 FROM pg_database WHERE datname='marketing'")" ]; then
          $$PSQL -c "CREATE DATABASE marketing OWNER marketing_app"
        fi
        # Herding: kun eier-rollen kan koble til databasen
        $$PSQL -c "REVOKE CONNECT ON DATABASE marketing FROM PUBLIC"
        $$PSQL -c "GRANT CONNECT ON DATABASE marketing TO marketing_app"
    networks:
      - bq_data
    restart: "no"

  control-plane:
    build: ../control-plane
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONTROL_PLANE_DATABASE_URL: ${CONTROL_PLANE_DATABASE_URL}
      POSTGRES_SUPER_USER: ${POSTGRES_SUPER_USER}
      POSTGRES_SUPER_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_HOST: postgres
      BASE_DOMAIN: ${BASE_DOMAIN}
      TENANT_IMAGE: ${TENANT_IMAGE}
      EDGE_NETWORK: ${EDGE_NETWORK}
      DATA_NETWORK: ${DATA_NETWORK}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_STANDARD: ${STRIPE_PRICE_STANDARD}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      OWNER_EMAIL: ${OWNER_EMAIL}          # driftsvarsler (provisjoneringsfeil, subdomene-kollisjon, mislighold)
      STATS_TOKEN: ${STATS_TOKEN}
      # Videresendes til hver tenant-container (se control-plane/src/provision.ts):
      # tenants viser vilkår/personvern, og sidene 404-er uten disse.
      LEGAL_COMPANY_NAME: ${LEGAL_COMPANY_NAME:-}
      LEGAL_COMPANY_ORGNR: ${LEGAL_COMPANY_ORGNR:-}
      LEGAL_COMPANY_ADDRESS_NO: ${LEGAL_COMPANY_ADDRESS_NO:-}
      LEGAL_COMPANY_ADDRESS_EN: ${LEGAL_COMPANY_ADDRESS_EN:-}
      LEGAL_CONTACT_EMAIL: ${LEGAL_CONTACT_EMAIL:-}
      # Ressurstak per tenant-container (valgfritt; defaults 768 / 1 i control-plane).
      TENANT_MEMORY_MB: ${TENANT_MEMORY_MB:-768}
      TENANT_CPUS: ${TENANT_CPUS:-1}
    volumes:
      # Privilegert: starter tenant-containere. Holdes liten og kun nådd via Traefik-webhook.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bq_edge
      - bq_data
    labels:
      - traefik.enable=true
      - traefik.http.routers.cp.rule=Host(`admin.${BASE_DOMAIN}`)
      - traefik.http.routers.cp.entrypoints=websecure
      - traefik.http.routers.cp.tls.certresolver=le
      - traefik.http.services.cp.loadbalancer.server.port=8080

  # ── Web-analyse (Umami) ──────────────────────────────────────────────────────
  # Personvernvennlig, cookieløs trafikkstatistikk på analytics.<domene>.
  # Egen database + begrenset rolle i den delte Postgres-en (som marketing).
  umami-db-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_SUPER_PASSWORD}
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        PSQL="psql -h postgres -U ${POSTGRES_SUPER_USER} -v ON_ERROR_STOP=1"
        if [ -z "$$($$PSQL -tAc "SELECT 1 FROM pg_roles WHERE rolname='umami_app'")" ]; then
          $$PSQL -c "CREATE ROLE umami_app LOGIN PASSWORD '$$UMAMI_DB_PASSWORD'"
        else
          $$PSQL -c "ALTER ROLE umami_app WITH PASSWORD '$$UMAMI_DB_PASSWORD'"
        fi
        if [ -z "$$($$PSQL -tAc "SELECT 1 FROM pg_database WHERE datname='umami'")" ]; then
          $$PSQL -c "CREATE DATABASE umami OWNER umami_app"
        fi
        $$PSQL -c "REVOKE CONNECT ON DATABASE umami FROM PUBLIC"
        $$PSQL -c "GRANT CONNECT ON DATABASE umami TO umami_app"
    networks:
      - bq_data
    restart: "no"

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on:
      umami-db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://umami_app:${UMAMI_DB_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    networks:
      - bq_edge
      - bq_data
    labels:
      - traefik.enable=true
      - traefik.http.routers.umami.rule=Host(`analytics.${BASE_DOMAIN}`)
      - traefik.http.routers.umami.entrypoints=websecure
      - traefik.http.routers.umami.tls.certresolver=le
      - traefik.http.services.umami.loadbalancer.server.port=3000

  # ── Server-dashbord (Netdata) ────────────────────────────────────────────────
  # Sanntids CPU/RAM/disk/nett + per-container på status.<domene>, bak basic-auth.
  netdata:
    image: netdata/netdata:stable
    restart: unless-stopped
    hostname: ${BASE_DOMAIN}
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - bq_edge
    labels:
      - traefik.enable=true
      - traefik.http.routers.netdata.rule=Host(`status.${BASE_DOMAIN}`)
      - traefik.http.routers.netdata.entrypoints=websecure
      - traefik.http.routers.netdata.tls.certresolver=le
      - traefik.http.services.netdata.loadbalancer.server.port=19999
      - traefik.http.routers.netdata.middlewares=netdata-auth
      - traefik.http.middlewares.netdata-auth.basicauth.usersfile=/auth/netdata.htpasswd
