# Quest of the Roasted Bean – selvhosting. Start alt med:  docker compose up -d
# Konfigurasjon leses fra .env (kopier fra .env.example).

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quest-of-the-roasted-bean
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quest-of-the-roasted-bean}
      POSTGRES_DB: quest-of-the-roasted-bean
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quest-of-the-roasted-bean -d quest-of-the-roasted-bean"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Bruker den innebygde databasen. Sett EXTERNAL_DATABASE_URL i .env for å overstyre.
      DATABASE_URL: ${EXTERNAL_DATABASE_URL:-postgresql://quest-of-the-roasted-bean:${POSTGRES_PASSWORD:-quest-of-the-roasted-bean}@db:5432/quest-of-the-roasted-bean}
      ADMIN_NICKNAME: ${ADMIN_NICKNAME:-GameMaster}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      UPLOAD_DIR: /app/uploads
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
