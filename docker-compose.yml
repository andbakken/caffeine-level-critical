# Caffeine Level Critical – selvhosting. Start alt med:  docker compose up -d
# Konfigurasjon leses fra .env (kopier fra .env.example).

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: caffeine-level-critical
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caffeine-level-critical}
      POSTGRES_DB: caffeine-level-critical
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caffeine-level-critical -d caffeine-level-critical"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Bruker den innebygde databasen. Sett EXTERNAL_DATABASE_URL i .env for å overstyre.
      DATABASE_URL: ${EXTERNAL_DATABASE_URL:-postgresql://caffeine-level-critical:${POSTGRES_PASSWORD:-caffeine-level-critical}@db:5432/caffeine-level-critical}
      ADMIN_NICKNAME: ${ADMIN_NICKNAME:-GameMaster}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      # Valgfritt: support-e-post. Vises som «Hjelp»-lenke i menyen når satt.
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      UPLOAD_DIR: /app/uploads
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
